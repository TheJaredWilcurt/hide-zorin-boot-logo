<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customize Zorin's boot logo</title>
    <link href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.css">
    <style>
      *,
      *:before,
      *:after {
        box-sizing: border-box;
      }
      body {
        background: #333;
        color: #EEE;
        font-family: sans-serif;
      }
      #app {
        text-align: center;
      }
      label {
        display: block;
      }
      .controls {
        display: flex;
        justify-content: space-around;
        margin: 1rem;
      }
      .screen {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        width: 1920px;
        height: 1080px;
        background: #000;
        overflow: auto;
        margin: 0px auto;
      }
      .hardware {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 720px;
      }
      .hardware img {
        max-width: 1160px;
        max-height: 200px;
      }
      .frame {
        width: 556px;
        height: 140px;
        animation-iteration-count: infinite;
        animation-duration: 3.2s;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.global.prod.js"></script>
  </head>
  <body>
    <div id="app">
      <component
        :is="'style'"
      >
        {{ keyframes }}
      </component>
      <div class="controls">
        <div>
          <label for="screen-size">Simulated Screen Size:</label>
          <input
            v-model="screenSize"
            id="screen-size"
            type="range"
            min="1"
            max="100"
          />
        </div>

        <div>
          <label for="manufacturer">Manufacturer:</label>
          <select
            v-model="manufacturer"
            id="manufacturer"
          >
            <option
              v-for="brand in manufacturers"
              :value="brand"
            >{{ titleCase(brand) }}</option>
          </select>
        </div>

        <div>
          <label for="os">OS Logo:</label>
          <select
            v-model="os"
            id="os"
          >
            <option
              v-for="theme in themes"
              :value="theme"
            >{{ titleCase(theme) }}</option>
          </select>
        </div>

        <div>
          <label for="show-throbber">
            <input
              v-model="showThrobber"
              type="checkbox"
              id="show-throbber"
            />
            Show Throbber
          </label>
        </div>
      </div>

      <div class="screen" :style="'zoom:' + screenSize / 100">
        <div class="hardware">
          <img
            :alt="manufacturer + ' Logo'"
            :src="baseURL + '/logos/' + manufacturer + '.png'"
          />
        </div>
        <div v-if="imageLoadingComplete">
          <div
            v-if="showThrobber"
            class="throbber frame"
            :style="'animation-name: ' + os + '-throbber'"
          ></div>
          <div
            v-else
            class="animation frame"
            :style="'animation-name: ' + os"
          ></div>
        </div>
      </div>
    </div>
    <script>
      Vue.createApp({
        data: function () {
          return {
            showThrobber: false,
            imageLoadingComplete: false,
            screenSize: 50,
            manufacturer: 'framework',
            os: 'original'
          };
        },
        methods: {
          titleCase: function (value) {
            const custom = {
              hp: 'HP'
            };
            if (custom[value]) {
              return custom[value];
            }
            return value
              .split('-')
              .map((word) => {
                return word[0].toUpperCase() + word.slice(1);
              })
              .join(' ');
          },
          loadImage: function (url) {
            return new Promise((resolve, reject) => {
              const image = new Image();
              image.addEventListener('load', () => {
                resolve(image);
              });
              image.addEventListener('error', (error) => {
                reject(error);
              });
              image.src = url;
            });
          },
          loadImages: function () {
            const promises = [];
            for (const index in this.themes) {
              const name = this.themes[index];
              let percent = 0;
              for (let i = 0; i < 37; i++) {
                const file = String(i).padStart(2, 0);
                const url = [
                  '/hide-zorin-boot-logo/',
                  name,
                  '/animation-',
                  file,
                  '.png'
                ].join('');
                promises.push(this.loadImage(url));
              }
              for (let j = 0; j < 39; j++) {
                const file = String(j).padStart(2, 0);
                const url = [
                  '/hide-zorin-boot-logo/',
                  name,
                  '/throbber-',
                  file,
                  '.png'
                ].join('');
                promises.push(this.loadImage(url));
              }
            }
            Promise
              .all(promises)
              .finally(() => {
                this.imageLoadingComplete = true;
              });
          }
        },
        computed: {
          keyframes: function () {
            const keyframes = [];
            for (const index in this.themes) {
              const name = this.themes[index];
              const amount = 37;
              const percentIncrease = 100 / amount;
              let percent = 0;
              keyframes.push('@keyframes ' + name + ' {');
              for (let i = 0; i < amount; i++) {
                let file = String(i).padStart(2, 0);
                keyframes.push(
                  '  ' +
                  (percent === 0 ? '0%, 100' : percent) +
                  '% { background-image: url(\'/hide-zorin-boot-logo/' +
                  name +
                  '/animation-' +
                  file +
                  '.png\'); }'
                );
                percent = percentIncrease + percent;
              }
              keyframes.push('}')
            }
            for (const index in this.themes) {
              const name = this.themes[index];
              const amount = 39;
              const percentIncrease = 100 / amount;
              let percent = 0;
              keyframes.push('@keyframes ' + name + '-throbber {');
              for (let i = 0; i < amount; i++) {
                let file = String(i).padStart(2, 0);
                keyframes.push(
                  '  ' +
                  (percent === 0 ? '0%, 100' : percent) +
                  '% { background-image: url(\'/hide-zorin-boot-logo/' +
                  name +
                  '/throbber-' +
                  file +
                  '.png\'); }'
                );
                percent = percentIncrease + percent;
              }
              keyframes.push('}')
            }
            return keyframes.join('\n');
          },
          baseURL: function () {
            return '/hide-zorin-boot-logo';
          },
          manufacturers: function () {
            // Must match the file names in /logos
            return [
              'blank',
              'asus',
              'dell',
              'framework',
              'hp',
              'system76',
              'tuxedo-computers'
            ];
          },
          themes: function () {
            return [
              'blank',
              'funny-cat',
              'original'
            ];
          }
        },
        created: function () {
          this.loadImages();
        }
      }).mount('#app');
    </script>
  </body>
</html>
